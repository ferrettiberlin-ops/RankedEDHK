<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankedEDHK - Program Reviews</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .page {
            display: flex;
            height: 100vh;
            background: white;
        }

        /* LEFT SIDEBAR */
        .sidebar {
            width: 250px;
            background: #7c3aed;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .uni-button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #7c3aed;
            transition: all 0.2s ease;
        }

        .uni-button:hover {
            background: #f3e8ff;
            border-color: #7c3aed;
        }

        .uni-button.active {
            background: #6d28d9;
            color: white;
            border-color: white;
        }

        /* MAIN CONTENT */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* PROGRAMS SECTION */
        .programs-section {
            background: #fafafa;
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
            max-height: 120px;
            overflow-y: auto;
        }

        .programs-section h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .program-button {
            display: inline-block;
            padding: 8px 12px;
            margin-right: 8px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .program-button:hover {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        .program-button.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        /* REVIEWS CONTAINER */
        .reviews-container {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        /* REVIEWS LIST */
        .reviews-list {
            flex: 1;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            overflow-y: auto;
            padding: 20px;
        }

        .reviews-list h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .review-item {
            padding: 15px;
            border-left: 4px solid #7c3aed;
            background: #f9f5ff;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .review-item h4 {
            color: #7c3aed;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .grade {
            display: inline-block;
            background: #7c3aed;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 8px;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .review-text {
            color: #555;
            font-size: 13px;
            line-height: 1.5;
            margin-top: 8px;
        }

        /* FORM PANEL */
        .form-panel {
            width: 350px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .form-panel h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .grade-select {
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .submit-btn {
            background: #7c3aed;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-top: auto;
            transition: background 0.2s ease;
        }

        .submit-btn:hover {
            background: #6d28d9;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message.warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <h2>Universities</h2>
            <div id="uniButtons"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="content">
            <!-- PROGRAMS SECTION -->
            <div class="programs-section">
                <h3>Programs</h3>
                <div id="programButtons"></div>
            </div>

            <!-- REVIEWS & FORM -->
            <div class="reviews-container">
                <div class="reviews-list">
                    <h3>Reviews for <span id="selectedProgramName">-</span></h3>
                    <div id="reviewsList"></div>
                </div>

                <div class="form-panel">
                    <h3>Submit Review</h3>
                    <div id="formMessage"></div>
                    <form id="reviewForm" style="flex: 1; display: flex; flex-direction: column;">
                        <div class="form-group">
                            <label>Email <span style="color: red;">*</span></label>
                            <input type="email" name="email" required placeholder="your@email.com">
                            <small style="color: #999;">One review per email address</small>
                        </div>

                        <div class="form-group">
                            <label>Year of Study</label>
                            <select name="yearOfStudy" required>
                                <option value="1">Year 1</option>
                                <option value="2">Year 2</option>
                                <option value="3">Year 3</option>
                                <option value="4">Year 4</option>
                                <option value="5">Year 5+</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Competitiveness</label>
                            <select name="competitiveness" class="grade-select" required>
                                <option value="A">A</option>
                                <option value="B" selected>B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                            <textarea name="competitionText" placeholder="Explain the competitiveness..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Social Opportunities</label>
                            <select name="social" class="grade-select" required>
                                <option value="A">A</option>
                                <option value="B" selected>B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                            <textarea name="socialText" placeholder="Tell us about social life..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Career Opportunities</label>
                            <select name="career" class="grade-select" required>
                                <option value="A">A</option>
                                <option value="B" selected>B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                            <textarea name="careerText" placeholder="Share career prospects..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Teaching Quality</label>
                            <select name="teaching" class="grade-select" required>
                                <option value="A">A</option>
                                <option value="B" selected>B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                            <textarea name="teachingText" placeholder="What's the teaching like?" required></textarea>
                        </div>

                        <button type="submit" class="submit-btn">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
